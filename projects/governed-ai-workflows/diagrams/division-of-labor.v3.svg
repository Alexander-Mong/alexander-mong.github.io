<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 700" role="img" aria-labelledby="t d" font-family="'Inter','Segoe UI',Helvetica,Arial,sans-serif">
  <title id="t">Where the model decides — and where it doesn't</title>
  <desc id="d">Source text splits to two finders — deterministic rules and the AI building its own candidate pool with bounded reasoning — which fold together (each catches what the other misses); the model judges whether each is really advice; keepers are anchored to a verbatim quote; the traceable result shows each item's review status. A left-side loop: rule gaps surfaced by the comparison are refined by hand. A right-side loop: a human grades samples to sharpen the judge. The model appears only twice — as a finder and as the judge — bounded by code and a person.</desc>

  <!-- ===== forward connectors ===== -->
  <g fill="none" stroke="#9AA0A6" stroke-width="1.5">
    <path d="M345,74 C290,98 212,108 170,121"/>
    <path d="M375,74 C430,98 508,108 550,121"/>
    <path d="M182,186 C236,220 296,232 340,249"/>
    <path d="M538,186 C484,220 424,232 380,249"/>
    <path d="M360,312 L360,349"/>
    <path d="M360,408 L360,445"/>
    <path d="M360,502 L360,541"/>
  </g>
  <g fill="#9AA0A6">
    <polygon points="165,121 175,121 170,129"/>
    <polygon points="545,121 555,121 550,129"/>
    <polygon points="335,249 345,249 340,257"/>
    <polygon points="375,249 385,249 380,257"/>
    <polygon points="355,349 365,349 360,357"/>
    <polygon points="355,445 365,445 360,453"/>
    <polygon points="355,541 365,541 360,549"/>
  </g>

  <!-- ===== feedback loops (green) ===== -->
  <g fill="none" stroke="#0E7C66" stroke-width="1.5">
    <path d="M248,292 C90,302 44,258 52,222 C58,200 76,193 96,193"/>
    <path d="M476,572 C548,568 576,530 580,493"/>
    <path d="M584,432 C584,402 524,382 470,382"/>
  </g>
  <g fill="#0E7C66">
    <polygon points="91,193 101,193 96,185"/>
    <polygon points="575,493 585,493 580,485"/>
    <polygon points="470,377 470,387 463,382"/>
  </g>
  <g fill="#0E7C66" font-size="10.5" text-anchor="middle">
    <text x="152" y="244">rule gaps —</text>
    <text x="152" y="258">refined by hand</text>
    <text x="556" y="534">samples</text>
    <text x="536" y="408">sharpens</text>
  </g>

  <!-- ===== nodes ===== -->
  <!-- source -->
  <rect x="290" y="34" width="140" height="40" rx="8" fill="#FFFFFF" stroke="#3A4047" stroke-width="1.3"/>
  <text x="360" y="59" font-size="13.5" font-weight="650" fill="#17191C" text-anchor="middle">Source text</text>

  <!-- finders -->
  <rect x="55" y="128" width="215" height="58" rx="8" fill="#FFFFFF" stroke="#3A4047" stroke-width="1.3"/>
  <text x="162" y="153" font-size="12.5" font-weight="650" fill="#17191C" text-anchor="middle">Rules find candidates</text>
  <text x="162" y="171" font-size="11" font-style="italic" fill="#8A9097" text-anchor="middle">deterministic</text>

  <rect x="450" y="128" width="215" height="58" rx="8" fill="#EEF1FF" stroke="#2747D6" stroke-width="2"/>
  <text x="557" y="153" font-size="12.5" font-weight="650" fill="#17191C" text-anchor="middle">AI builds its own pool</text>
  <text x="557" y="171" font-size="11" font-style="italic" fill="#8A9097" text-anchor="middle">bounded reasoning</text>

  <!-- fold -->
  <rect x="248" y="256" width="224" height="56" rx="8" fill="#F1F2F4" stroke="#9AA0A6" stroke-width="1.2"/>
  <text x="360" y="280" font-size="12.5" font-weight="650" fill="#17191C" text-anchor="middle">fold both pools together</text>
  <text x="360" y="298" font-size="10.5" font-style="italic" fill="#5A6068" text-anchor="middle">each catches what the other misses</text>

  <!-- judge -->
  <rect x="256" y="356" width="208" height="52" rx="8" fill="#EEF1FF" stroke="#2747D6" stroke-width="2"/>
  <text x="360" y="380" font-size="12.5" font-weight="650" fill="#17191C" text-anchor="middle">Model judges</text>
  <text x="360" y="397" font-size="11" fill="#5A6068" text-anchor="middle">is it really advice?</text>

  <!-- anchor -->
  <rect x="250" y="452" width="220" height="50" rx="8" fill="#FFFFFF" stroke="#3A4047" stroke-width="1.3"/>
  <text x="360" y="474" font-size="12.5" font-weight="650" fill="#17191C" text-anchor="middle">Anchor to a verbatim quote</text>
  <text x="360" y="492" font-size="11" font-style="italic" fill="#8A9097" text-anchor="middle">deterministic</text>

  <!-- result -->
  <rect x="244" y="548" width="232" height="56" rx="8" fill="#FFFFFF" stroke="#2747D6" stroke-width="1.6"/>
  <text x="360" y="572" font-size="12.5" font-weight="650" fill="#17191C" text-anchor="middle">Traceable result</text>
  <text x="360" y="590" font-size="11" font-style="italic" fill="#8A9097" text-anchor="middle">each item: human-checked, or not yet</text>

  <!-- human -->
  <rect x="486" y="432" width="196" height="54" rx="8" fill="#FFF7ED" stroke="#B45309" stroke-width="1.8"/>
  <text x="584" y="455" font-size="12" font-weight="650" fill="#17191C" text-anchor="middle">A human grades samples</text>
  <text x="584" y="472" font-size="11" font-style="italic" fill="#8A9097" text-anchor="middle">sharpens the judge</text>
</svg>
