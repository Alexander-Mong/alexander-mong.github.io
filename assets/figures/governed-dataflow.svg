<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 800" role="img" aria-labelledby="t d" font-family="'Inter','Segoe UI',Helvetica,Arial,sans-serif">
  <title id="t">Governed data-flow — where the model decides and where it doesn't</title>
  <desc id="d">Source text splits to two finders — deterministic rules and an LLM lens building its own candidate pool — which fold into one pool; the model judges whether each candidate is real; keepers are anchored to a verbatim quote and land in a traceable result where each item is human-checked or not yet. Two feedback loops: rule gaps are refined by hand, and a human grades a sample to sharpen the judge. The model appears only twice — as a finder and as the judge.</desc>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7.5,3 L0,6 Z" fill="#9AA0A6"/></marker>
    <marker id="ahg" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7.5,3 L0,6 Z" fill="#0E7C66"/></marker>
  </defs>
  <rect x="0" y="0" width="740" height="800" fill="#FCFCFB"/>

  <!-- header -->
  <text x="48" y="42" font-size="12" font-weight="700" letter-spacing="2.6" fill="#2747D6">GOVERNED DATA-FLOW</text>
  <text x="46" y="78" font-size="21" font-weight="650" fill="#17191C">Where the model decides — and where it doesn't</text>
  <text x="48" y="100" font-size="12.5" fill="#5A6068">Two finders feed one pool the model judges. Code anchors and counts; a person grades samples to sharpen the judge.</text>
  <line x1="48" y1="118" x2="692" y2="118" stroke="#E7E8E5" stroke-width="1"/>

  <!-- legend -->
  <g font-size="11.5" fill="#55595F">
    <rect x="556" y="132" width="14" height="12" rx="2" fill="#FFFFFF" stroke="#3A4047" stroke-width="1.3"/>
    <text x="578" y="142">code · deterministic</text>
    <rect x="556" y="152" width="14" height="12" rx="2" fill="#EEF1FF" stroke="#2747D6" stroke-width="1.6"/>
    <text x="578" y="162">model · finds + judges</text>
    <rect x="556" y="172" width="14" height="12" rx="2" fill="#FFF7ED" stroke="#B45309" stroke-width="1.6"/>
    <text x="578" y="182">human</text>
    <line x1="556" y1="197" x2="572" y2="197" stroke="#0E7C66" stroke-width="2.2"/>
    <text x="578" y="201">feedback loop</text>
  </g>

  <!-- forward connectors -->
  <g fill="none" stroke="#9AA0A6" stroke-width="1.6">
    <path d="M356,196 C300,214 232,222 188,231" marker-end="url(#ah)"/>
    <path d="M384,196 C440,214 508,222 552,231" marker-end="url(#ah)"/>
    <path d="M196,300 C238,318 286,326 320,335" marker-end="url(#ah)"/>
    <path d="M544,300 C502,318 454,326 420,335" marker-end="url(#ah)"/>
    <path d="M370,396 L370,432" marker-end="url(#ah)"/>
    <path d="M370,494 L370,530" marker-end="url(#ah)"/>
    <path d="M370,588 L370,624" marker-end="url(#ah)"/>
  </g>

  <!-- feedback loops -->
  <g fill="none" stroke="#0E7C66" stroke-width="1.6">
    <path d="M250,362 C132,372 44,346 44,300 C44,256 96,250 158,250" marker-end="url(#ahg)"/>
    <path d="M492,650 C540,648 560,610 576,590" marker-end="url(#ahg)"/>
    <path d="M602,534 C604,492 546,470 490,466" marker-end="url(#ahg)"/>
  </g>
  <g font-size="11.5" fill="#0E7C66">
    <text x="120" y="316" text-anchor="middle">rule gaps,</text>
    <text x="120" y="332" text-anchor="middle">refined by hand</text>
    <text x="548" y="656" text-anchor="middle">a sample</text>
    <text x="548" y="518" text-anchor="middle">sharpens the judge</text>
  </g>

  <!-- nodes -->
  <g text-anchor="middle">
    <!-- SOURCE -->
    <rect x="296" y="146" width="148" height="52" rx="9" fill="#FFFFFF" stroke="#3A4047" stroke-width="1.4"/>
    <text x="370" y="170" font-size="14" font-weight="650" fill="#17191C">Source text</text>
    <text x="370" y="187" font-size="11" font-style="italic" fill="#8A9097">conference talks</text>

    <!-- RULES finder -->
    <rect x="60" y="234" width="224" height="64" rx="9" fill="#FFFFFF" stroke="#3A4047" stroke-width="1.4"/>
    <text x="172" y="262" font-size="14" font-weight="650" fill="#17191C">Rules find candidates</text>
    <text x="172" y="281" font-size="11" font-style="italic" fill="#8A9097">deterministic</text>

    <!-- LLM lens finder -->
    <rect x="456" y="234" width="224" height="64" rx="9" fill="#EEF1FF" stroke="#2747D6" stroke-width="2"/>
    <text x="568" y="260" font-size="14" font-weight="650" fill="#17191C">LLM lens builds a pool</text>
    <text x="568" y="279" font-size="11" fill="#2747D6">reads whole talks for what rules miss</text>

    <!-- FOLD -->
    <rect x="250" y="338" width="240" height="58" rx="9" fill="#F4F5F7" stroke="#3A4047" stroke-width="1.4"/>
    <text x="370" y="365" font-size="14" font-weight="650" fill="#17191C">Fold into one pool</text>
    <text x="370" y="383" font-size="11" font-style="italic" fill="#8A9097">each catches the other's gaps</text>

    <!-- JUDGE -->
    <rect x="254" y="436" width="232" height="58" rx="9" fill="#EEF1FF" stroke="#2747D6" stroke-width="2"/>
    <text x="370" y="463" font-size="14" font-weight="650" fill="#17191C">Model judges</text>
    <text x="370" y="481" font-size="11.5" fill="#2747D6">is it real? — one bounded vote</text>

    <!-- ANCHOR -->
    <rect x="256" y="534" width="228" height="54" rx="9" fill="#FFFFFF" stroke="#3A4047" stroke-width="1.4"/>
    <text x="370" y="561" font-size="14" font-weight="650" fill="#17191C">Anchor to a verbatim quote</text>
    <text x="370" y="579" font-size="11" font-style="italic" fill="#8A9097">deterministic</text>

    <!-- RESULT -->
    <rect x="250" y="628" width="240" height="58" rx="9" fill="#FFFFFF" stroke="#2747D6" stroke-width="1.9"/>
    <text x="370" y="655" font-size="14" font-weight="650" fill="#17191C">Traceable result</text>
    <text x="370" y="673" font-size="11" fill="#6A7079">each item: human-checked, or not yet</text>

    <!-- HUMAN -->
    <rect x="520" y="534" width="176" height="54" rx="9" fill="#FFF7ED" stroke="#B45309" stroke-width="1.8"/>
    <text x="608" y="559" font-size="13.5" font-weight="650" fill="#17191C">Human</text>
    <text x="608" y="576" font-size="11" font-style="italic" fill="#8A9097">reviews &amp; can overrule</text>
  </g>

  <line x1="48" y1="746" x2="692" y2="746" stroke="#E7E8E5" stroke-width="1"/>
  <text x="48" y="770" font-size="11" font-weight="700" letter-spacing="1.6" fill="#2747D6">GOVERNANCE</text>
  <text x="150" y="770" font-size="11.5" fill="#55595F">content-addressed IDs · schema + validate · pre-registered controls — read-only, governs every stage</text>
</svg>
